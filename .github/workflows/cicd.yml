# =============================================
# GitHub Actions CI/CD Pipeline
# Node.js App → Docker → Deploy to EC2
# =============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: nodejs-cicd-demo
  DOCKER_IMAGE: nodejs-cicd-demo

jobs:
  # ─────────────────────────────────────────
  # Job 1: Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # Job 2: Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Save Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 3: Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Stop old containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Dừng containers cũ (nếu có)
            cd ~/app 2>/dev/null && docker compose down 2>/dev/null || true

            # Dọn dẹp images cũ
            docker image prune -f

            # Tạo thư mục app nếu chưa có
            mkdir -p ~/app/nginx

            echo "✅ Old containers cleaned up"

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "image.tar.gz,docker-compose.yml,nginx/default.conf"
          target: "/tmp/deploy"

      - name: Load image and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Loading Docker image..."
            docker load < /tmp/deploy/image.tar.gz

            echo "📂 Copying config files..."
            cp /tmp/deploy/docker-compose.yml ~/app/
            cp /tmp/deploy/nginx/default.conf ~/app/nginx/

            # Dọn file tạm
            rm -rf /tmp/deploy

            echo "🏃 Starting containers with docker compose..."
            cd ~/app
            APP_VERSION=${{ github.sha }} docker compose up -d

            echo "⏳ Waiting for health check..."
            sleep 8

            # Health check qua Nginx (port 80)
            if curl -sf http://localhost/health > /dev/null; then
              echo "✅ Deployment successful!"
              echo "── App Health ──"
              curl -s http://localhost/health | python3 -m json.tool
              echo ""
              echo "── Nginx Health ──"
              curl -s http://localhost/nginx-health
              echo ""
              echo "── Container Status ──"
              docker compose ps
            else
              echo "❌ Health check failed!"
              echo "── App Logs ──"
              docker compose logs app
              echo "── Nginx Logs ──"
              docker compose logs nginx
              exit 1
            fi

