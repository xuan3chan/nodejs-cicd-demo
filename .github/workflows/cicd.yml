name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: azure-kitchen-backend
  FRONTEND_IMAGE: azure-kitchen-frontend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server lint
        working-directory: ./server
        run: npm run lint

      - name: Run server tests
        working-directory: ./server
        run: npm test

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          outputs: type=docker,dest=/tmp/backend-image.tar
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          push: false
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Compress images
        run: |
          gzip /tmp/backend-image.tar
          gzip /tmp/frontend-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/backend-image.tar.gz
            /tmp/frontend-image.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: .

      - name: Prepare EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/app
            docker stop azure-kitchen-backend nginx-proxy 2>/dev/null || true
            docker rm azure-kitchen-backend nginx-proxy 2>/dev/null || true
            docker image prune -f

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "backend-image.tar.gz,frontend-image.tar.gz,docker-compose.yml"
          target: "/tmp/deploy"

      - name: Load images and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            docker load < /tmp/deploy/backend-image.tar.gz
            docker load < /tmp/deploy/frontend-image.tar.gz

            cp /tmp/deploy/docker-compose.yml ~/app/
            rm -rf /tmp/deploy

            cd ~/app

            export APP_VERSION=${{ github.sha }}
            export CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            export CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            export CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}

            docker compose up -d --no-build --remove-orphans

            echo "Waiting for health check..."
            sleep 15

            if curl -sf http://localhost/api/health > /dev/null; then
              echo "Deployment successful"
              docker compose ps
            else
              echo "Health check failed"
              echo "Backend logs"
              docker compose logs backend --tail=50
              echo "Nginx logs"
              docker compose logs nginx --tail=20
              exit 1
            fi
