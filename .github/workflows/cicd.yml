# =============================================
# GitHub Actions CI/CD Pipeline
# Azure Kitchen Fullstack (React + NestJS)
# → Docker → Deploy to EC2
# =============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: azure-kitchen
  DOCKER_IMAGE: azure-kitchen

jobs:
  # ─────────────────────────────────────────
  # Job 1: Test Frontend + Backend
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # --- Frontend ---
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client (type check)
        working-directory: ./client
        run: npm run build

      # --- Backend ---
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server lint
        working-directory: ./server
        run: npm run lint

      - name: Run server tests
        working-directory: ./server
        run: npm test

  # ─────────────────────────────────────────
  # Job 2: Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compress image
        run: gzip /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 3: Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Stop old containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            cd ~/app 2>/dev/null && docker compose down 2>/dev/null || true

            docker stop azure-kitchen 2>/dev/null || true
            docker rm azure-kitchen 2>/dev/null || true
            docker stop nginx-proxy 2>/dev/null || true
            docker rm nginx-proxy 2>/dev/null || true
            docker stop nodejs-cicd-demo 2>/dev/null || true
            docker rm nodejs-cicd-demo 2>/dev/null || true

            docker image prune -f
            mkdir -p ~/app/nginx

            echo "✅ Old containers cleaned up"

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "image.tar.gz,docker-compose.yml,nginx/default.conf"
          target: "/tmp/deploy"

      - name: Load image and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Loading Docker image..."
            docker load < /tmp/deploy/image.tar.gz

            echo "📂 Copying config files..."
            cp /tmp/deploy/docker-compose.yml ~/app/
            cp /tmp/deploy/nginx/default.conf ~/app/nginx/

            rm -rf /tmp/deploy

            echo "🏃 Starting containers with docker compose..."
            cd ~/app

            # Truyền biến môi trường từ GitHub Secrets
            export APP_VERSION=${{ github.sha }}
            export CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            export CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            export CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}

            docker compose up -d

            echo "⏳ Waiting for health check..."
            sleep 12

            if curl -sf http://localhost/api/health > /dev/null; then
              echo "✅ Deployment successful!"
              echo "── App Health ──"
              curl -s http://localhost/api/health | python3 -m json.tool
              echo ""
              echo "── Nginx Health ──"
              curl -s http://localhost/nginx-health
              echo ""
              echo "── Container Status ──"
              docker compose ps
            else
              echo "❌ Health check failed!"
              echo "── App Logs ──"
              docker compose logs app
              echo "── Nginx Logs ──"
              docker compose logs nginx
              exit 1
            fi
