# =============================================
# GitHub Actions CI/CD Pipeline
# Node.js App → Docker → Deploy to EC2
# =============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  APP_NAME: nodejs-cicd-demo
  DOCKER_IMAGE: nodejs-cicd-demo

jobs:
  # ─────────────────────────────────────────
  # Job 1: Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run linting
        run: npm run lint

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────
  # Job 2: Build Docker Image
  # ─────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

      - name: Save Docker image
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 3: Deploy to EC2
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Stop old container if running
            docker stop ${{ env.APP_NAME }} 2>/dev/null || true
            docker rm ${{ env.APP_NAME }} 2>/dev/null || true

            # Clean up old images
            docker image prune -f

            echo "✅ Old container cleaned up"

      - name: Copy image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "image.tar.gz"
          target: "/tmp/"

      - name: Load and run new container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Loading Docker image..."
            docker load < /tmp/image.tar.gz
            rm /tmp/image.tar.gz

            echo "🏃 Starting new container..."
            docker run -d \
              --name ${{ env.APP_NAME }} \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e APP_VERSION=${{ github.sha }} \
              --memory=128m \
              --cpus=0.5 \
              ${{ env.DOCKER_IMAGE }}:latest

            echo "⏳ Waiting for health check..."
            sleep 5

            # Health check
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "✅ Deployment successful!"
              curl -s http://localhost:3000/health | python3 -m json.tool
            else
              echo "❌ Health check failed!"
              docker logs ${{ env.APP_NAME }}
              exit 1
            fi
