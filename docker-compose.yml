version: '3.8'

services:
  # ─────────────────────────────────────
  # Nginx - Reverse Proxy (cổng ra bên ngoài)
  # ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"            # HTTP từ bên ngoài
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  # ─────────────────────────────────────
  # Node.js App (chỉ nội bộ, không mở port ra ngoài)
  # ─────────────────────────────────────
  app:
    build:
      context: .
      target: production
    container_name: nodejs-cicd-demo
    # Không dùng "ports" → chỉ Nginx truy cập được
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - APP_VERSION=1.0.0
      - PORT=3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
