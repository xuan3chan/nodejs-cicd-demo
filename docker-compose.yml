services:
  # ─────────────────────────────────────
  # Nginx - Reverse Proxy (cổng ra bên ngoài)
  # ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

  # ─────────────────────────────────────
  # Node.js App (chỉ nội bộ, không mở port ra ngoài)
  # ─────────────────────────────────────
  app:
    image: nodejs-cicd-demo:latest
    container_name: nodejs-cicd-demo
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - PORT=3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
